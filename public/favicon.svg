<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Navy rounded background -->
  <rect width="32" height="32" rx="7" fill="#1B3C78"/>
  <!-- Basket handle -->
  <path d="M10.5 15 Q10.5 8.5 16 8.5 Q21.5 8.5 21.5 15" stroke="white" stroke-width="2" fill="none" stroke-linecap="round"/>
  <!-- Basket body -->
  <rect x="7" y="15" width="18" height="10" rx="2" fill="white"/>
  <!-- Vertical weave lines -->
  <line x1="12.5" y1="15" x2="11" y2="25" stroke="#1B3C78" stroke-width="1.2"/>
  <line x1="16" y1="15" x2="16" y2="25" stroke="#1B3C78" stroke-width="1.2"/>
  <line x1="19.5" y1="15" x2="21" y2="25" stroke="#1B3C78" stroke-width="1.2"/>
  <!-- Horizontal weave lines -->
  <line x1="7" y1="18.5" x2="25" y2="18.5" stroke="#1B3C78" stroke-width="1.2"/>
  <line x1="7" y1="22" x2="25" y2="22" stroke="#1B3C78" stroke-width="1.2"/>
  <!-- Green accent dot (brand color) -->
  <circle cx="25.5" cy="7.5" r="3.5" fill="#3DB540"/>
</svg>
